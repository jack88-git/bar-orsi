<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boccette Verona - Lucio Edition</title>
    <style>
        body { 
            background: #121212; color: white; font-family: sans-serif; 
            margin: 0; padding: 0; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; height: 100vh;
        }
        .ui-top { 
            background: #222; padding: 10px; display: flex; 
            justify-content: space-around; border-bottom: 2px solid #444; flex-shrink: 0;
        }
        .score-box { text-align: center; }
        .val { font-weight: bold; color: #f1c40f; font-size: 1.4rem; display: block; }
        .label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; }
        #game-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #1a1a1a; padding: 5px; position: relative; }
        canvas { background: #076324; border: 6px solid #5d3a1a; border-radius: 4px; }

        /* Overlay del Lucio */
        #lucio-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px;
        }
        #lucio-img {
            width: 200px; height: 200px; border-radius: 50%; border: 6px solid #f1c40f;
            /* Riferimento alla foto nella tua cartella */
            background: url('lucio.jpg') center/cover; 
            margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.4);
        }
        #lucio-msg { font-size: 1.6rem; font-weight: bold; color: #fff; margin-bottom: 35px; font-style: italic; line-height: 1.3; }
        #btn-tasi {
            background: #c0392b; color: white; border: none; padding: 20px 40px;
            font-size: 1.4rem; font-weight: bold; border-radius: 60px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .turn-indicator { padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; margin-top: 4px; display: inline-block; }
        .turn-white { background: #fff; color: #000; }
        .turn-red { background: #f00; color: #fff; }
    </style>
</head>
<body>

<div class="ui-top">
    <div class="score-box">
        <span class="label">Bianco</span>
        <span id="scW" class="val">0</span>
        <small>Bilie: <span id="rW">4</span></small>
    </div>
    <div style="text-align:center">
        <div id="status-box" class="turn-indicator turn-white">TURNO BIANCO</div>
    </div>
    <div class="score-box">
        <span class="label">Rosso</span>
        <span id="scR" class="val">0</span>
        <small>Bilie: <span id="rR">4</span></small>
    </div>
</div>

<div id="game-container">
    <canvas id="table"></canvas>
    
    <div id="lucio-overlay">
        <div id="lucio-img"></div>
        <div id="lucio-msg">"Varda che tiro..."</div>
        <button id="btn-tasi">...Lucio, tasi...</button>
    </div>
</div>

<script>
const canvas = document.getElementById('table');
const ctx = canvas.getContext('2d');
const lucioOverlay = document.getElementById('lucio-overlay');
const lucioMsg = document.getElementById('lucio-msg');

const TABLE_RATIO = 2, SUB = 8;
let scale, R, PR, D, ACCHITO_Y;

let state = 'PALLINO', turn = 'white', scores = { white: 0, red: 0 }, rem = { white: 4, red: 4 };
let balls = [], activeBall = null, inputPos = { x: 0, y: 0 }, drag = { startX: 0, startY: 0, currX: 0, currY: 0 };
let pins = [], turnData = { hitSpondaAltaPrima: false, hasHitBall: false, foulType: null };

// LE TUE FRASI ORIGINALI
const phrasesVuoto = [
    "Te si proprio strasso", "Se mira col corpo...", "Ma gheto du mani sinistre?", 
    "quasi te ciape el buso del mona", "non si segna", "No le bastieme",
    "Domandaghe ai butei se g'ha bisogno al bar", "Me sparo una pippella",
    "Cattivo il Marlborino?!", "Almanco te bocci ben", 
    "Quando l'è drita l'è sempre elegante", "le candele sono i tiri più difficili"
];

function showLucio(type, pts = 0) {
    let m = "";
    if (type === 'VUOTO') {
        m = phrasesVuoto[Math.floor(Math.random() * phrasesVuoto.length)];
    } else if (type === 'PUNTI') {
        m = `Orcocan! Te ghè fato ${pts} punti! Dio can, te par squasi bon!`;
    } else if (type === 'FALLO') {
        m = "Ma varda che fallo da mona! Dio Can, tutto all'avversario!";
    }
    
    lucioMsg.innerText = `"${m}"`;
    lucioOverlay.style.display = 'flex';
}

document.getElementById('btn-tasi').onclick = () => { lucioOverlay.style.display = 'none'; };

function resize() {
    const container = document.getElementById('game-container');
    const availableW = container.clientWidth - 20, availableH = container.clientHeight - 20;
    if (availableH / availableW > TABLE_RATIO) {
        canvas.width = availableW; canvas.height = availableW * TABLE_RATIO;
    } else {
        canvas.height = availableH; canvas.width = availableH / TABLE_RATIO;
    }
    scale = canvas.width / 450;
    R = 11 * scale; PR = 3 * scale; D = 28 * scale; ACCHITO_Y = canvas.height - (225 * scale);
    initPins();
}

function initPins() {
    const base = [{x:0,y:0,c:'red'},{x:28,y:0,c:'white'},{x:-28,y:0,c:'white'},{x:0,y:28,c:'white'},{x:0,y:-28,c:'white'}];
    pins = base.map(p => ({ x: p.x * scale, y: p.y * scale, c: p.c, hit: false }));
}

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx-rect.left)*(canvas.width/rect.width), y: (cy-rect.top)*(canvas.height/rect.height) };
}

function physics() {
    for(let s=0; s<SUB; s++) {
        balls.forEach(b => {
            if (b.vx === 0 && b.vy === 0) return;
            b.x += b.vx/SUB; b.y += b.vy/SUB;
            if (b.x<R || b.x>canvas.width-R) { b.vx*=-0.7; b.x=b.x<R?R:canvas.width-R; }
            if (b.y<R) { b.y=R; b.vy*=-0.7; if(b.isStriker && !turnData.hasHitBall) turnData.hitSpondaAltaPrima=true; }
            if (b.y>canvas.height-R) { b.y=canvas.height-R; b.vy*=-0.7; }
            pins.forEach(p => {
                if(!p.hit) {
                    let d = Math.sqrt((b.x-(canvas.width/2+p.x))**2 + (b.y-(canvas.height/2+p.y))**2);
                    if(d<R+PR){ p.hit=true; if(b.isStriker){ turnData.foulType='castello'; turnData.hasHitBall=true;}}
                }
            });
        });
        for (let i=0; i<balls.length; i++) {
            for (let j=i+1; j<balls.length; j++) {
                let b1=balls[i], b2=balls[j];
                let dx=b2.x-b1.x, dy=b2.y-b1.y, dist=Math.sqrt(dx*dx+dy*dy);
                if(dist<R*2) {
                    if((b1.isStriker||b2.isStriker)&&!turnData.hasHitBall){
                        let target=b1.isStriker?b2:b1;
                        if(target.y>canvas.height/2 && !turnData.hitSpondaAltaPrima) turnData.foulType='diretto';
                        turnData.hasHitBall=true;
                    }
                    let nx=dx/dist, ny=dy/dist, ov=(R*2-dist)/2;
                    b1.x-=nx*ov; b1.y-=ny*ov; b2.x+=nx*ov; b2.y+=ny*ov;
                    let v1n=b1.vx*nx+b1.vy*ny, v2n=b2.vx*nx+b2.vy*ny;
                    b1.vx+=(v2n-v1n)*nx; b1.vy+=(v2n-v1n)*ny;
                    b2.vx+=(v1n-v2n)*nx; b2.vy+=(v1n-v2n)*ny;
                }
            }
        }
    }
}

function finalizeShot() {
    let pts = 0;
    pins.forEach(p => { if(p.hit) pts += (p.c==='red'?4:2); });
    let opp = (turn==='white')?'red':'white';

    if (turnData.foulType === 'diretto') {
        scores[opp]+=2; balls = JSON.parse(JSON.stringify(lastStableSetup));
        showLucio('FALLO');
    } else {
        if(pts > 0) {
            if(turnData.hitSpondaAltaPrima) pts*=2;
            if(turnData.foulType==='castello') scores[opp]+=pts, showLucio('FALLO');
            else scores[turn]+=pts, showLucio('PUNTI', pts);
        } else {
            showLucio('VUOTO');
        }
    }
    pins.forEach(p=>p.hit=false);
    balls.forEach(b=>b.isStriker=false);

    if(rem.white===0 && rem.red===0) { balls=[]; rem={white:4,red:4}; state='PALLINO'; }
    else {
        let boccino = balls.find(b=>b.color==='blue');
        let dW = getMinDist(boccino, 'white'), dR = getMinDist(boccino, 'red');
        turn = (rem.white>0 && rem.red>0)? (dW<=dR?'red':'white') : (rem.white>0?'white':'red');
        state='PIAZZA';
    }
    updateUI();
}

function getMinDist(p, c) { let m=Infinity; balls.filter(b=>b.color===c).forEach(b=>{let d=Math.sqrt((b.x-p.x)**2+(b.y-p.y)**2); if(d<m) m=d;}); return m; }

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(state==='PIAZZA') { ctx.fillStyle="rgba(255,255,255,0.05)"; ctx.fillRect(0,ACCHITO_Y,canvas.width,canvas.height-ACCHITO_Y); }
    ctx.strokeStyle="rgba(255,255,255,0.1)"; ctx.beginPath(); ctx.moveTo(0,canvas.height/2); ctx.lineTo(canvas.width,canvas.height/2); ctx.stroke();
    pins.forEach(p=>{ if(!p.hit){ ctx.fillStyle=p.c==='red'?'#f33':'#fff'; ctx.beginPath(); ctx.arc(canvas.width/2+p.x,canvas.height/2+p.y,PR,0,7); ctx.fill(); }});
    balls.forEach(b=>{
        ctx.fillStyle=b.color==='blue'?'#0af':(b.color==='white'?'#fff':'#f33');
        ctx.beginPath(); ctx.arc(b.x,b.y,R,0,7); ctx.fill(); ctx.strokeStyle="#000"; ctx.stroke();
    });
    if(state==='CARICA_TIRO') {
        ctx.beginPath(); ctx.moveTo(activeBall.x, activeBall.y);
        ctx.lineTo(activeBall.x+(drag.startX-drag.currX), activeBall.y+(drag.startY-drag.currY));
        ctx.strokeStyle="white"; ctx.setLineDash([2,2]); ctx.stroke(); ctx.setLineDash([]);
    }
}

function updateUI() {
    document.getElementById('scW').innerText=scores.white; document.getElementById('scR').innerText=scores.red;
    document.getElementById('rW').innerText=rem.white; document.getElementById('rR').innerText=rem.red;
    const sb=document.getElementById('status-box'); sb.innerText="TURNO "+turn.toUpperCase();
    sb.className="turn-indicator "+(turn==='white'?'turn-white':'turn-red');
}

canvas.addEventListener('touchstart', (e)=>{
    if(lucioOverlay.style.display==='flex') return;
    e.preventDefault(); const pos=getPos(e);
    if(state==='PALLINO' && pos.y < canvas.height/2) { balls.push({x:pos.x,y:pos.y,vx:0,vy:0,color:'blue'}); state='PIAZZA'; updateUI(); }
    else if(state==='PIAZZA' && pos.y > ACCHITO_Y) {
        lastStableSetup = JSON.parse(JSON.stringify(balls));
        activeBall={x:pos.x,y:pos.y,vx:0,vy:0,color:turn,isStriker:true}; balls.push(activeBall); state='MIRA'; updateUI();
    }
    else if(state==='MIRA') { drag.startX=pos.x; drag.startY=pos.y; drag.currX=pos.x; drag.currY=pos.y; state='CARICA_TIRO'; }
}, {passive:false});

canvas.addEventListener('touchmove', (e)=>{ e.preventDefault(); const pos=getPos(e); if(state==='CARICA_TIRO'){ drag.currX=pos.x; drag.currY=pos.y; } }, {passive:false});

canvas.addEventListener('touchend', ()=>{
    if(state==='CARICA_TIRO') {
        let dx=drag.startX-drag.currX, dy=drag.startY-drag.currY;
        if(Math.sqrt(dx*dx+dy*dy)<5){ state='MIRA'; return; }
        turnData={hitSpondaAltaPrima:false,hasHitBall:false,foulType:null};
        activeBall.vx=dx*0.15; activeBall.vy=dy*0.15; rem[turn]--; state='MOVIMENTO'; updateUI();
    }
});

function loop() {
    if(state==='MOVIMENTO') {
        physics();
        let moving=false;
        balls.forEach(b=>{ b.vx*=0.992; b.vy*=0.992; if(Math.abs(b.vx)>0.1||Math.abs(b.vy)>0.1) moving=true; else {b.vx=0;b.vy=0;}});
        if(!moving) finalizeShot();
    }
    draw(); requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
resize(); updateUI(); loop();
</script>
</body>
</html>
